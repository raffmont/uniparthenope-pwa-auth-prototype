<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#003366">
  <title>UniParthenope PWA Auth Prototype</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="#">UniParthenope Auth PWA</a>
      <span class="badge text-bg-light" id="connectionStatus">Checking session...</span>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="card-body p-4 p-md-5">
            <div class="mb-4">
              <h1 class="h3 mb-2">Web app login prototype</h1>
              <p class="text-secondary mb-0">
                Flask proxies credentials to the UniParthenope App login endpoint and keeps the returned API token server-side.
              </p>
            </div>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <section id="loginPanel">
              <form id="loginForm" autocomplete="on">
                <div class="mb-3">
                  <label for="username" class="form-label">Username</label>
                  <input class="form-control form-control-lg" id="username" name="username" type="text" autocomplete="username" required>
                </div>
                <div class="mb-4">
                  <label for="password" class="form-label">Password</label>
                  <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button id="loginButton" type="submit" class="btn btn-primary btn-lg w-100">
                  Login
                </button>
              </form>
            </section>

            <section id="sessionPanel" class="d-none">
              <div class="p-4 rounded-4 bg-light mb-4">
                <h2 class="h5 mb-3">Authenticated session</h2>
                <dl class="row mb-0" id="userDetails"></dl>
              </div>
              <button id="logoutButton" type="button" class="btn btn-outline-danger btn-lg w-100">
                Logout
              </button>
            </section>
          </div>
        </div>

        <div class="text-center mt-4 text-secondary small">
          MIT-licensed open-source prototype. Do not use the default secret key in production.
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
